name: Publish

on:
    push:
        branches: [main]

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - name: Use Node.js 24.x
              uses: actions/setup-node@v4
              with:
                  node-version: 24.x
                  registry-url: https://registry.npmjs.org
            - run: npm ci
            - run: npm run build
            - run: npm publish --access public
